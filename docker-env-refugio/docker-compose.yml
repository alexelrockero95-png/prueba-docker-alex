services:
  web:
    build: .
    container_name: php-web-refugioalex
    ports:
      - "8092:80"
    volumes:
      - ../proyecto-php-refugio:/var/www/html
    depends_on:
      db:
        condition: service_started
  db:
    image: mariadb:11
    container_name: mariadb-refugio
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: refugio_php
      MYSQL_USER: cuidador
      MYSQL_PASSWORD: animales123
    volumes:
      - ./db-refugio:/var/lib/mysql
    ports:
      - "3310:3306"
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin-refugio
    restart: always
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_USER: cuidador
      PMA_PASSWORD: animales123
    ports:
      - "8093:80"
  browsersync:
    image: node:20-alpine
    container_name: browsersync-refugio
    working_dir: /app
    depends_on:
      - web
    volumes:
      - ../proyecto-php-refugio:/src
    command: sh -c "npm install -g browser-sync && browser-sync start --proxy 'web:80' --files '/src/**/*.*' --no-ui --host 0.0.0.0 --port 3002"
    ports:
      - "3011:3002"
